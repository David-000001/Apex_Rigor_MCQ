<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Apex Rigor MCQ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Top Config Bar -->
    <div id="top-bar">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span class="brand-name">APEX RIGOR MCQ <span class="version">v2.0</span></span>
      </div>
      <div class="device-toggle">
        <button id="btn-mobile" class="toggle-btn active" onclick="App.setDeviceMode('mobile')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
          <span>Phone</span>
        </button>
        <button id="btn-full" class="toggle-btn" onclick="App.setDeviceMode('full')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>Canvas</span>
        </button>
      </div>
    </div>

    <!-- Device Wrapper -->
    <div id="device-wrapper">
      <div id="device-frame">

        <!-- Simulated Status Bar -->
        <div id="status-bar">
          <span id="clock">12:00 PM</span>
          <div id="notch"></div>
          <div class="status-right">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/></svg>
            <span class="signal">5G</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3"/></svg>
            <span class="battery">98%</span>
          </div>
        </div>

        <!-- Main Scrollable Content -->
        <div id="main-content">
          <div id="screen-home"    class="screen active"></div>
          <div id="screen-generate" class="screen"></div>
          <div id="screen-library"  class="screen"></div>
          <div id="screen-quiz"     class="screen"></div>
          <div id="screen-review"   class="screen"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
          <button class="nav-btn active" data-tab="home" onclick="App.navigate('home')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
            <span>Dashboard</span>
          </button>
          <button class="nav-btn" data-tab="generate" onclick="App.navigate('generate')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            <span>Compiler</span>
          </button>
          <button class="nav-btn" data-tab="library" onclick="App.navigate('library')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <span>Library</span>
          </button>
        </nav>

        <!-- Android gesture bar -->
        <div id="gesture-bar"><div class="gesture-pill"></div></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
